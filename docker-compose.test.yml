services:
  postgres-test:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: quickbite_test
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  order-integration-test:
    build:
      context: .
      target: builder
    environment:
      DB_eg_HOST: postgres-test
      DB_eg_PORT: 5432
      DB_eg_USERNAME: postgres
      DB_eg_PASSWORD: quickbite_test
      DB_eg_NAME: order_service_test_eg
      ARCHIVE_DB_eg_HOST: postgres-test
      ARCHIVE_DB_eg_PORT: 5432
      ARCHIVE_DB_eg_USERNAME: postgres
      ARCHIVE_DB_eg_PASSWORD: quickbite_test
      ARCHIVE_DB_eg_NAME: order_service_test_eg
    depends_on:
      postgres-test:
        condition: service_healthy
    command: ["pnpm", "run", "test:integration"]
